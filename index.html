<body class="bg-surface selection:bg-secondary-container selection:text-on-secondary-container">
<!-- TopAppBar -->
<header class="bg-surface text-primary font-button-label text-button-label uppercase tracking-widest docked full-width top-0 border-b-2 border-outline-variant flex justify-between items-center w-full px-margin-mobile h-[72px] fixed z-50"><div class="flex items-center gap-2 h-full">

<span class="font-alert-xl text-button-label font-extrabold text-secondary-container uppercase tracking-tight">SENYASPO</span>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center min-w-[56px] min-h-[56px] text-on-surface hover:bg-surface-container-highest transition-colors rounded-lg"><span class="font-label-sm font-bold">PH/EN</span></button>
</div></header>
<main class="pt-[100px] pb-margin-mobile px-margin-mobile min-h-screen">
<!-- Connectivity & Status Banner -->
<!-- 2x3 Main Interaction Grid -->
<div class="grid grid-cols-2 gap-4"><!-- Card 1: I Am Deaf Card -->
<button class="col-span-2 aspect-[2/1] bg-secondary-container text-on-secondary-container p-6 flex flex-col justify-between items-start border-4 border-on-secondary-container touch-active text-left min-h-[56px] rounded shadow-lg shadow-black/40">
<div><h2 class="font-card-title text-[32px] leading-tight uppercase">I Am Deaf Card</h2><p class="font-body-lg text-lg mt-1 italic">"Bingi ako. Hindi ako makarinig."</p><p class="font-label-sm opacity-80 mt-2">Show this to the driver/staff</p></div>
</button>
<!-- Card 2: Sabihin Mo -->
<button class="aspect-square bg-surface-container border-2 border-outline px-4 py-6 flex flex-col justify-center items-center gap-4 touch-active min-w-[56px] min-h-[56px] rounded uppercase">
<span class="font-button-label text-center leading-tight">Sabihin Mo</span>
</button>
<!-- Card 3: Fare Calculator -->
<button class="aspect-square bg-surface-container border-2 border-outline px-4 py-6 flex flex-col justify-center items-center gap-4 touch-active min-w-[56px] min-h-[56px] rounded uppercase">
<span class="font-button-label text-center leading-tight uppercase">Fare Calculator</span>
</button>
<!-- Card 4: Route Reference -->
<button class="aspect-square bg-surface-container border-2 border-outline px-4 py-6 flex flex-col justify-center items-center gap-4 touch-active min-w-[56px] min-h-[56px] rounded uppercase">
<span class="font-button-label text-center leading-tight uppercase">Route Reference</span>
</button>
<!-- Card 5: Set My Stop -->
<button class="aspect-square bg-surface-container border-2 border-outline px-4 py-6 flex flex-col justify-center items-center gap-4 touch-active min-w-[56px] min-h-[56px] rounded uppercase">
<span class="font-button-label text-center leading-tight uppercase">Set My Stop</span>
</button>
<!-- Card 6: AI Assistant -->
<button class="col-span-2 bg-primary-container border-primary p-6 flex items-center gap-6 touch-active min-h-[56px] rounded border-2 border-dashed">
<div class="text-left">
<h2 class="font-button-label text-primary uppercase">AI Assistant</h2>
<p class="font-label-sm text-on-primary-container">Ask about transfers or delays</p>
<span class="inline-block mt-2 px-2 py-0.5 rounded bg-surface-container-high text-[10px] font-bold uppercase tracking-wider text-outline">Internet Required</span></div>
</button></div>
