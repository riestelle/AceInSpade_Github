<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Atkinson Hyperlegible Next', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        /* Custom oversized text for maximum readability as per request */
        .giant-signal-text {
            font-size: 84px;
            line-height: 1;
            font-weight: 900;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background text-on-background overflow-hidden select-none">
<!-- 
        Main Canvas Area 
        Strict minimal view for signaling drivers or fellow passengers.
        All navigation shells (TopAppBar, BottomNavBar) are suppressed to focus on the central task.
    -->
<main class="flex flex-col items-center justify-center min-h-screen w-full px-margin-mobile relative">
<!-- Central Signal Container -->
<div class="flex flex-col items-center text-center space-y-4">
<!-- Primary Signal Phrase -->
<h1 class="giant-signal-text text-on-background uppercase tracking-tighter">
                PARA PO
            </h1>
<!-- Secondary Translation Translation -->
<p class="font-body-lg text-body-lg text-secondary-fixed-dim uppercase tracking-[0.2em] font-extrabold">
                Stop here
            </p>
</div>
<!-- 
            Dismiss Action
            Positioned at the bottom safe zone for easy one-handed closure.
            Tactile interaction style applied.
        -->
<div class="absolute bottom-12 left-0 w-full flex justify-center">
<button aria-label="Close signal screen" class="w-[touch-target-min] h-[touch-target-min] flex items-center justify-center rounded-full border-2 border-surface-variant active:scale-95 active:bg-surface-bright transition-all duration-150">
<span class="material-symbols-outlined text-on-surface text-4xl" data-icon="close">
                    close
                </span>
</button>
</div>
</main>
<!-- 
        Background Visual Texture 
        Subtle grid or pattern to maintain the "utilitarian tool" feel without distracting from the message.
    -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-5">
<div class="w-full h-full" style="background-image: radial-gradient(#bbc7df 1px, transparent 1px); background-size: 32px 32px;"></div>
</div>
</body></html>
